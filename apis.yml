name: Shawbrook Bank
kind: company
description: >-
  Shawbrook Bank Limited is a specialist UK savings and lending bank
  (trading as Shawbrook, part of Shawbrook Group plc, which listed on the
  London Stock Exchange in October 2025 after being owned by a consortium
  led by BC Partners and Pollen Street Capital since 2017). It is
  authorised by the Prudential Regulation Authority and regulated by the
  Financial Conduct Authority and the PRA, and its deposits are protected
  by the Financial Services Compensation Scheme. Shawbrook focuses on
  personal and business savings and specialist lending (property finance,
  SME and asset finance, and consumer lending) rather than personal
  current accounts, so it is not one of the nine CMA-mandated banks
  (CMA9). As an FCA-authorised deposit-taker it operates within the UK
  Open Banking / PSD2 framework: it consumes Open Banking (using account
  verification via Consents.Online to confirm customers' linked nominated
  accounts) more than it publishes ASPSP surfaces. As of this review
  Shawbrook does not operate a public developer portal, and no Shawbrook
  Open Data (ATM/branch/product) endpoint or bank-specific Read/Write
  API host could be confirmed live; the OBIE Open Data and Read/Write
  API families are represented here as the shared Open Banking standard
  that an FCA-authorised ASPSP conforms to, not as verified Shawbrook
  contracts.
