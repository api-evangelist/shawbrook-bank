apis:
- aid: shawbrook-bank:shawbrook-open-data-api
  name: Shawbrook Open Data API (OBIE Standard, Unverified)
  description: >-
    UK Open Banking Open Data API — the PUBLIC, unauthenticated reference-data
    surface (ATM locations, branches, personal and business current accounts,
    unsecured SME loans, commercial credit cards) defined by the Open Banking
    Implementation Entity (OBIE) Open Data Standard v1.3. No Shawbrook-hosted
    Open Data endpoint could be confirmed live (probes of shawbrook.co.uk
    /open-banking paths and /.well-known/open-banking returned HTTP 404), and
    as a specialist savings/lending bank without a branch or ATM network
    Shawbrook has minimal Open Data obligations. The harvested spec is the
    shared OBIE standard, NOT a Shawbrook contract.
  humanURL: https://openbankinguk.github.io/opendata-api-docs-pub/v2.4.0/
  tags:
  - Open Data
  - Public
  - Reference Data
  properties:
  - type: OpenAPI
    url: openapi/obie-opendata-swagger.json
  - type: Documentation
    url: https://openbankinguk.github.io/opendata-api-docs-pub/v2.4.0/
  - type: SourceCode
    url: https://github.com/OpenBankingUK/opendata-api-spec-compiled
- aid: shawbrook-bank:shawbrook-account-transaction-api
  name: Shawbrook Account & Transaction Information API (AIS, OBIE Standard, Unverified)
  description: >-
    UK Open Banking Read/Write Account & Transaction Information API (AISP) as
    defined by the OBIE Account and Transaction API Specification v4.0.1
    (OpenAPI 3.0.0). FAPI-secured — OAuth2/OIDC authorization, mutual-TLS
    client authentication, and PSD2 strong customer authentication — requiring
    developer onboarding with OBIE/eIDAS certificates. No Shawbrook-specific
    ASPSP host or developer portal could be confirmed; the harvested spec is
    the shared OBIE standard a UK ASPSP conforms to, not a verified Shawbrook
    contract.
  humanURL: https://standards.openbanking.org.uk/api-specifications/
  tags:
  - Account Information
  - AISP
  - Read Write
  - FAPI
  properties:
  - type: OpenAPI
    url: openapi/obie-account-info-openapi.yaml
  - type: Documentation
    url: https://standards.openbanking.org.uk/api-specifications/
  - type: SourceCode
    url: https://github.com/OpenBankingUK/read-write-api-specs
- aid: shawbrook-bank:shawbrook-payment-initiation-api
  name: Shawbrook Payment Initiation API (PIS, OBIE Standard, Unverified)
  description: >-
    UK Open Banking Read/Write Payment Initiation API (PISP) as defined by the
    OBIE Payment Initiation API Specification v4.0.1 (OpenAPI 3.0.0).
    FAPI-secured with OAuth2/OIDC, mutual-TLS, and PSD2 strong customer
    authentication, gated behind OBIE/eIDAS-certificate onboarding. No
    Shawbrook-specific ASPSP host or developer portal could be confirmed; the
    harvested spec is the shared OBIE standard, not a verified Shawbrook
    contract.
  humanURL: https://standards.openbanking.org.uk/api-specifications/
  tags:
  - Payment Initiation
  - PISP
  - Read Write
  - FAPI
  properties:
  - type: OpenAPI
    url: openapi/obie-payment-initiation-openapi.yaml
  - type: Documentation
    url: https://standards.openbanking.org.uk/api-specifications/
  - type: SourceCode
    url: https://github.com/OpenBankingUK/read-write-api-specs
- aid: shawbrook-bank:shawbrook-confirmation-of-funds-api
  name: Shawbrook Confirmation of Funds API (CBPII, OBIE Standard, Unverified)
  description: >-
    UK Open Banking Read/Write Confirmation of Funds API (CBPII) as defined by
    the OBIE Confirmation of Funds API Specification v4.0.1 (OpenAPI 3.0.0).
    FAPI-secured with OAuth2/OIDC, mutual-TLS, and PSD2 SCA, requiring
    OBIE/eIDAS-certificate onboarding. No Shawbrook-specific ASPSP host or
    developer portal could be confirmed; the harvested spec is the shared OBIE
    standard, not a verified Shawbrook contract.
  humanURL: https://standards.openbanking.org.uk/api-specifications/
  tags:
  - Confirmation of Funds
  - CBPII
  - Read Write
  - FAPI
  properties:
  - type: OpenAPI
    url: openapi/obie-confirmation-funds-openapi.yaml
  - type: Documentation
    url: https://standards.openbanking.org.uk/api-specifications/
  - type: SourceCode
    url: https://github.com/OpenBankingUK/read-write-api-specs
